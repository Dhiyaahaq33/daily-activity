name: Daily activity

on:
  schedule:
    - cron: '17 3 * * *'   # ~10:17 WIB every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log 10 timestamped entries
        run: |
          git config user.name "Dhiyaahaq33"
          git config user.email "139051782+Dhiyaahaq33@users.noreply.github.com"
          for i in $(seq 1 10); do
            echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') #$i" >> log.txt
            git add log.txt
            git commit -m "chore: daily activity log ($i/10)"
          done
          git push
