name: Daily activity

on:
  schedule:
    - cron: '17 3 * * *'   # ~10:17 WIB every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log timestamp
        run: echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> log.txt

      - name: Commit and push if changed
        run: |
          git config user.name "Dhiyaahaq33"
          git config user.email "139051782+Dhiyaahaq33@users.noreply.github.com"
          git add log.txt
          git diff --cached --quiet || git commit -m "chore: daily activity log"
          git push
